<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週間学習リスト（曜日別）</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #f8faff;
    --border: #e2e8f8;
    --text: #1a1f3c;
    --text-muted: #6b7499;
    --accent-blue: #3b6ef8;
    --accent-blue-light: #dce8ff;
    --accent-pink: #f857a6;
    --accent-pink-light: #ffe0f3;
    --accent-green: #22c97c;
    --accent-green-light: #d4f7e8;
    --accent-amber: #f59e0b;
    --accent-amber-light: #fef3c7;
    --accent-purple: #8b5cf6;
    --accent-purple-light: #ede9fe;
    --accent-teal: #0ea5e9;
    --accent-teal-light: #e0f5ff;
    --accent-orange: #f97316;
    --accent-orange-light: #fff0e6;
    --shadow: 0 2px 12px rgba(59,110,248,0.08);
    --shadow-hover: 0 6px 24px rgba(59,110,248,0.16);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; left: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,110,248,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(248,87,166,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent-blue);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }
  header h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .date-display {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  /* Overall progress */
  .overall-progress {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-blue);
    white-space: nowrap;
  }

  /* ===== 毎朝 fixed card ===== */
  .mainichi-card {
    background: linear-gradient(135deg, #fffbe6 0%, #fff0fa 100%);
    border-radius: var(--radius);
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 2px solid #ffe58a;
  }
  .mainichi-header {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .mainichi-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: #fff8cc;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .mainichi-title {
    flex: 1;
  }
  .mainichi-title h2 {
    font-size: 15px;
    font-weight: 900;
    color: #c47a00;
  }
  .mainichi-sub {
    font-size: 10px;
    color: #c47a00;
    opacity: 0.7;
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }
  .mainichi-mini {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: #fff3b0;
    color: #c47a00;
    flex-shrink: 0;
  }
  .mainichi-chevron {
    font-size: 12px;
    color: #c47a00;
    opacity: 0.6;
    transition: transform 0.2s;
  }
  .mainichi-card.collapsed .mainichi-chevron { transform: rotate(-90deg); }
  .mainichi-list {
    border-top: 1px solid #ffe58a;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(.4,0,.2,1);
    max-height: 600px;
  }
  .mainichi-card.collapsed .mainichi-list { max-height: 0; border-top: none; }
  .mainichi-card .item-row.checked .custom-cb { background: var(--accent-amber); }
  .mainichi-card .custom-cb { border-color: #ffe58a; }

  /* ===== Day accordion ===== */
  .day-section {
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .day-section:hover { box-shadow: var(--shadow-hover); }

  .day-header {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    border-left: 5px solid transparent;
  }

  .day-badge {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    font-weight: 900;
    line-height: 1;
  }
  .day-badge .day-jp { font-size: 16px; }
  .day-badge .day-sub { font-size: 8px; font-family: 'DM Mono', monospace; opacity: 0.7; margin-top: 1px; }

  .day-title-wrap { flex: 1; }
  .day-title-wrap h2 { font-size: 15px; font-weight: 900; }
  .day-subtitle { font-size: 11px; margin-top: 2px; opacity: 0.75; font-weight: 500; }

  .day-progress-mini {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .day-done-badge {
    display: none;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent-green-light);
    color: var(--accent-green);
  }
  .day-section.all-done .day-done-badge { display: inline-flex; align-items: center; gap: 3px; }

  .day-chevron {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .day-section.collapsed .day-chevron { transform: rotate(-90deg); }

  .day-items {
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
    max-height: 2000px;
  }
  .day-section.collapsed .day-items { max-height: 0; }

  /* Sub-section (午前/午後) */
  .sub-section-label {
    padding: 7px 18px 4px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    border-bottom: 1px dashed var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Item row */
  .item-row {
    display: flex;
    align-items: center;
    padding: 11px 18px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }
  .item-row.checked { background: var(--surface2); }

  .custom-cb {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    background: white;
  }
  .item-row.checked .custom-cb { border-color: transparent; }
  .custom-cb .check-icon {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    font-size: 13px;
    color: white;
    font-weight: 700;
  }
  .item-row.checked .custom-cb .check-icon { opacity: 1; transform: scale(1); }

  .item-label {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .item-row.checked .item-label { text-decoration: line-through; color: var(--text-muted); }
  .item-label.type-red { color: #e53935; font-weight: 700; }
  .item-label.type-blue { color: #1565c0; font-weight: 700; }
  .item-row.checked .item-label.type-red,
  .item-row.checked .item-label.type-blue { color: var(--text-muted); }

  .item-type-badge {
    font-size: 11px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }
  .item-type-badge.badge-red { background: #fde8e8; color: #e53935; border: 1.5px solid #f8a8a8; }
  .item-type-badge.badge-blue { background: #e3eeff; color: #1565c0; border: 1.5px solid #90b4f8; }
  .item-row.checked .item-type-badge { opacity: 0.4; }

  /* Day color themes */
  /* 月 */
  .day-mon { background: #fff8ff; }
  .day-mon .day-header { border-left-color: #d946ef; background: #fff8ff; }
  .day-mon .day-badge { background: #fae8ff; color: #d946ef; }
  .day-mon .day-title-wrap h2 { color: #a21caf; }
  .day-mon .day-subtitle { color: #d946ef; }
  .day-mon .day-progress-mini { background: #fae8ff; color: #a21caf; }
  .day-mon .item-row.checked .custom-cb { background: #d946ef; }
  .day-mon .custom-cb { border-color: #f0abfc; }

  /* 火 */
  .day-tue { background: #fff5f0; }
  .day-tue .day-header { border-left-color: var(--accent-orange); background: #fff5f0; }
  .day-tue .day-badge { background: var(--accent-orange-light); color: var(--accent-orange); }
  .day-tue .day-title-wrap h2 { color: #c2410c; }
  .day-tue .day-subtitle { color: var(--accent-orange); }
  .day-tue .day-progress-mini { background: var(--accent-orange-light); color: #c2410c; }
  .day-tue .item-row.checked .custom-cb { background: var(--accent-orange); }
  .day-tue .custom-cb { border-color: #fdba74; }

  /* 水 */
  .day-wed { background: #f0faff; }
  .day-wed .day-header { border-left-color: var(--accent-teal); background: #f0faff; }
  .day-wed .day-badge { background: var(--accent-teal-light); color: var(--accent-teal); }
  .day-wed .day-title-wrap h2 { color: #0369a1; }
  .day-wed .day-subtitle { color: var(--accent-teal); }
  .day-wed .day-progress-mini { background: var(--accent-teal-light); color: #0369a1; }
  .day-wed .item-row.checked .custom-cb { background: var(--accent-teal); }
  .day-wed .custom-cb { border-color: #7dd3fc; }

  /* 木 */
  .day-thu { background: #f0fff8; }
  .day-thu .day-header { border-left-color: var(--accent-green); background: #f0fff8; }
  .day-thu .day-badge { background: var(--accent-green-light); color: var(--accent-green); }
  .day-thu .day-title-wrap h2 { color: #15803d; }
  .day-thu .day-subtitle { color: var(--accent-green); }
  .day-thu .day-progress-mini { background: var(--accent-green-light); color: #15803d; }
  .day-thu .item-row.checked .custom-cb { background: var(--accent-green); }
  .day-thu .custom-cb { border-color: #6ee7b7; }

  /* 金 */
  .day-fri { background: #fffbf0; }
  .day-fri .day-header { border-left-color: var(--accent-amber); background: #fffbf0; }
  .day-fri .day-badge { background: var(--accent-amber-light); color: var(--accent-amber); }
  .day-fri .day-title-wrap h2 { color: #b45309; }
  .day-fri .day-subtitle { color: var(--accent-amber); }
  .day-fri .day-progress-mini { background: var(--accent-amber-light); color: #b45309; }
  .day-fri .item-row.checked .custom-cb { background: var(--accent-amber); }
  .day-fri .custom-cb { border-color: #fcd34d; }

  /* 土 */
  .day-sat { background: #f8f0ff; }
  .day-sat .day-header { border-left-color: var(--accent-purple); background: #f8f0ff; }
  .day-sat .day-badge { background: var(--accent-purple-light); color: var(--accent-purple); }
  .day-sat .day-title-wrap h2 { color: #6d28d9; }
  .day-sat .day-subtitle { color: var(--accent-purple); }
  .day-sat .day-progress-mini { background: var(--accent-purple-light); color: #6d28d9; }
  .day-sat .item-row.checked .custom-cb { background: var(--accent-purple); }
  .day-sat .custom-cb { border-color: #c4b5fd; }
  .day-sat .sub-section-label { color: var(--accent-purple); }

  /* 日 */
  .day-sun { background: #fff0f3; }
  .day-sun .day-header { border-left-color: var(--accent-pink); background: #fff0f3; }
  .day-sun .day-badge { background: var(--accent-pink-light); color: var(--accent-pink); }
  .day-sun .day-title-wrap h2 { color: #be185d; }
  .day-sun .day-subtitle { color: var(--accent-pink); }
  .day-sun .day-progress-mini { background: var(--accent-pink-light); color: #be185d; }
  .day-sun .item-row.checked .custom-cb { background: var(--accent-pink); }
  .day-sun .custom-cb { border-color: #f9a8d4; }

  /* Today highlight */
  .day-section.today {
    box-shadow: 0 0 0 3px rgba(59,110,248,0.35), var(--shadow-hover);
  }
  .today-tag {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--accent-blue);
    color: white;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 20px;
    animation: confettiDrop 1.2s ease-in forwards;
  }
  @keyframes confettiDrop {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(80px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-badge">WEEKLY STUDY LIST</div>
    <h1>📅 曜日別学習リスト</h1>
    <div class="date-display" id="dateDisplay"></div>
  </header>

  <div class="overall-progress">
    <span class="progress-label">TODAY</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="overallBar"></div>
    </div>
    <span class="progress-count" id="overallCount">0 / 0</span>
  </div>

  <!-- 曜日別セクション -->
  <div id="daysContainer"></div>
</div>

<script type="module">
// ===================================================
// FIREBASE
// ===================================================
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyADUL3Zu7ZkguKuz7LUSarfAj7JFkteTMw",
  authDomain: "hahuka-tools.firebaseapp.com",
  databaseURL: "https://hahuka-tools-default-rtdb.firebaseio.com",
  projectId: "hahuka-tools",
  storageBucket: "hahuka-tools.firebasestorage.app",
  messagingSenderId: "1097903942252",
  appId: "1:1097903942252:web:f5713546094f3b4f55c649"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const checklistRef = ref(db, 'checklist');

// ===================================================
// DATA
// ===================================================

// 毎朝の項目（月曜00:00リセット）
// 毎朝カードは「今日の曜日」のdaily状態を表示する
const MAINICHI_ITEMS = [
  { label: 'ピアノ',        dailyKey: 'piano' },
  { label: '日々計算',      dailyKey: 'keisan' },
  { label: '語彙力UP 1300', dailyKey: 'goi' },
];

// 毎日系アイテムは曜日ごとに独立したキーで管理
// stateKey: 'daily_<dayId>_<dailyKey>' の形式
// 例: daily_mon_piano, daily_tue_kumon など
const DAILY_KEYS = ['piano', 'keisan', 'goi', 'kumon'];
const DAILY_RESET = { day: 1, hour: 0 }; // 月曜00:00

// 毎朝・毎日セクションを各曜日に挿入するヘルパー
function makeDailySection(dayId) {
  return [
    {
      label: '☀️ 毎朝',
      items: [
        { label: '日々計算',      type: 'normal', stateKey: `daily_${dayId}_keisan`, itemIdx: 0 },
        { label: '語彙力UP 1300', type: 'normal', stateKey: `daily_${dayId}_goi`,    itemIdx: 0 },
      ]
    },
    {
      label: '🌙 毎日',
      items: [
        { label: 'ピアノ', type: 'normal', stateKey: `daily_${dayId}_piano`,  itemIdx: 0 },
        { label: '公文',   type: 'normal', stateKey: `daily_${dayId}_kumon`,  itemIdx: 0 },
      ]
    },
  ];
}

// 曜日別データ
const DAYS = [
  {
    id: 'mon',
    cssClass: 'day-mon',
    dayIndex: 1,
    label: '月', labelEn: 'MON',
    title: '月曜日',
    subtitle: '',
    sections: [
      {
        label: '📚 学習',
        items: [
          { label: '最レ算数 解き直し',                    type: 'red',    stateKey: 'saile',  itemIdx: 3 },
          { label: '漢字・四字熟語/ことわざ/慣用句　確認', type: 'blue',   stateKey: 'kokugo', itemIdx: 7 },
          { label: '英語 レッスン宿題',                    type: 'normal', stateKey: 'eigo',   itemIdx: 0 },
          { label: '英語 書き取り宿題',                    type: 'normal', stateKey: 'eigo',   itemIdx: 1 },
        ]
      },
      ...makeDailySection('mon'),
    ]
  },
  {
    id: 'tue',
    cssClass: 'day-tue',
    dayIndex: 2,
    label: '火', labelEn: 'TUE',
    title: '火曜日',
    subtitle: '公文',
    sections: [
      {
        label: '📚 学習',
        items: [
          { label: 'ベーシック算数 確認', type: 'blue',   stateKey: 'sansu', itemIdx: 4 },
          { label: '英語 レッスン予習',   type: 'normal', stateKey: 'eigo',  itemIdx: 2 },
        ]
      },
      ...makeDailySection('tue'),
    ]
  },
  {
    id: 'wed',
    cssClass: 'day-wed',
    dayIndex: 3,
    label: '水', labelEn: 'WED',
    title: '水曜日',
    subtitle: '希ベーシック',
    sections: [
      {
        label: '📚 学習',
        items: [
          { label: 'ベーシック算数 基礎A',      type: 'normal', stateKey: 'sansu', itemIdx: 0 },
          { label: 'ベーシック算数 応用B',      type: 'normal', stateKey: 'sansu', itemIdx: 1 },
          { label: 'ベーシック算数 復習テスト', type: 'normal', stateKey: 'sansu', itemIdx: 2 },
          { label: '英語 予習',                 type: 'normal', stateKey: 'eigo',  itemIdx: 2 },
        ]
      },
      ...makeDailySection('wed'),
    ]
  },
  {
    id: 'thu',
    cssClass: 'day-thu',
    dayIndex: 4,
    label: '木', labelEn: 'THU',
    title: '木曜日',
    subtitle: '英語',
    sections: [
      {
        label: '📚 学習',
        items: [
          { label: 'ベーシック国語 大問１・大問２',                 type: 'normal', stateKey: 'kokugo', itemIdx: 0 },
          { label: 'ベーシック国語 文法・語句',                     type: 'normal', stateKey: 'kokugo', itemIdx: 1 },
          { label: 'ベーシック国語 漢字・四字熟語/ことわざ/慣用句', type: 'normal', stateKey: 'kokugo', itemIdx: 2 },
        ]
      },
      ...makeDailySection('thu'),
    ]
  },
  {
    id: 'fri',
    cssClass: 'day-fri',
    dayIndex: 5,
    label: '金', labelEn: 'FRI',
    title: '金曜日',
    subtitle: 'ピアノ・公文',
    sections: [
      {
        label: '📚 学習',
        items: [
          { label: 'ベーシック算数 チャレンジ', type: 'normal', stateKey: 'sansu',  itemIdx: 2 },

      {

        items: [
          { label: '最レ算数 基礎A',                          type: 'normal', stateKey: 'saile',  itemIdx: 0 },

// カテゴリのリセット設定
const CAT_RESET = {
  kokugo:   { day: 3, hour: 18 },
  sansu:    { day: 3, hour: 18 },
  saile:    { day: 6, hour: 18 },
  eigo:     { day: 4, hour: 18 },
};

// カテゴリごとのアイテム数
const CAT_ITEM_COUNT = {
  kokugo: 8, sansu: 5, saile: 4, eigo: 3,
};

// 毎日系（曜日別独立）の全stateKey一覧
// daily_<dayId>_<dailyKey> → checked:[bool] 1個、lastResetTs
const DAILY_STATE_KEYS = [];
['mon','tue','wed','thu','fri','sat','sun'].forEach(dayId => {
  DAILY_KEYS.forEach(dk => DAILY_STATE_KEYS.push(`daily_${dayId}_${dk}`));
});
// 毎朝カードの piano/keisan/goi も今日の曜日の daily キーを使う


// ===================================================
// STATE
// ===================================================
function getFirebaseKey(key) { return `study_v2_${key}`; }

function getLastResetTs(resetCfg, now) {
  const d = new Date(now);
  for (let i = 0; i <= 7; i++) {
    const c = new Date(d);
    c.setDate(d.getDate() - i);
    c.setHours(resetCfg.hour, 0, 0, 0);
    if (c <= d && c.getDay() === resetCfg.day) return c.getTime();
  }
  return 0;
}

const catStates = {};

function saveCatState(key, st) {
  set(ref(db, `checklist/${getFirebaseKey(key)}`), st)
    .catch(e => console.error('Firebase save error:', e));
}

// Firebase から受け取ったデータにリセット処理を適用して catStates を更新
function applyResets(firebaseData) {
  const now = Date.now();
  const data = firebaseData || {};

  // カテゴリ系
  Object.keys(CAT_RESET).forEach(catId => {
    const fbKey = getFirebaseKey(catId);
    let st = data[fbKey];
    if (!st || !Array.isArray(st.checked)) {
      st = { checked: Array(CAT_ITEM_COUNT[catId]).fill(false), lastResetTs: 0 };
    }
    const expectedReset = getLastResetTs(CAT_RESET[catId], now);
    if (expectedReset > (st.lastResetTs || 0)) {
      st = { checked: Array(CAT_ITEM_COUNT[catId]).fill(false), lastResetTs: expectedReset };
      saveCatState(catId, st);
    }
    catStates[catId] = st;
  });

  // 毎日系（曜日別独立）
  DAILY_STATE_KEYS.forEach(key => {
    const fbKey = getFirebaseKey(key);
    let st = data[fbKey];
    if (!st || !Array.isArray(st.checked)) {
      st = { checked: [false], lastResetTs: 0 };
    }
    const expectedReset = getLastResetTs(DAILY_RESET, now);
    if (expectedReset > (st.lastResetTs || 0)) {
      st = { checked: [false], lastResetTs: expectedReset };
      saveCatState(key, st);
    }
    catStates[key] = st;
  });
}

function isChecked(stateKey, itemIdx) {
  return catStates[stateKey]?.checked[itemIdx] ?? false;
}

function setChecked(stateKey, itemIdx, val) {
  if (!catStates[stateKey]) catStates[stateKey] = { checked: [false], lastResetTs: 0 };
  catStates[stateKey].checked[itemIdx] = val;
  saveCatState(stateKey, catStates[stateKey]);
}

// ===================================================
// BUILD UI
// ===================================================
function itemRowHTML(item, rowId) {
  const checked = isChecked(item.stateKey, item.itemIdx);
  const checkedClass = checked ? ' checked' : '';
  const badgeHTML = item.type === 'red'
    ? `<span class="item-type-badge badge-red">🔴 解き直し</span>`
    : item.type === 'blue'
    ? `<span class="item-type-badge badge-blue">🔵 最終確認</span>`
    : '';
  const labelClass = item.type === 'red' ? 'item-label type-red'
    : item.type === 'blue' ? 'item-label type-blue' : 'item-label';
  return `
    <div class="item-row${checkedClass}" id="${rowId}"
         onclick="toggleWeekItem('${rowId}', '${item.stateKey}', ${item.itemIdx})">
      <div class="custom-cb"><span class="check-icon">✓</span></div>
      <span class="${labelClass}">${item.label}</span>
      ${badgeHTML}
    </div>`;
}

function getTodayDayId() {
  const idx = new Date().getDay();
  return ['sun','mon','tue','wed','thu','fri','sat'][idx];
}

function buildDays() {
  const container = document.getElementById('daysContainer');
  const todayIdx = new Date().getDay();
  container.innerHTML = '';

  DAYS.forEach(day => {
    const isToday = day.dayIndex === todayIdx;
    const section = document.createElement('div');
    section.className = `day-section ${day.cssClass}${isToday ? ' today' : ''}`;
    section.id = `day-${day.id}`;

    const todayTag = isToday ? `<span class="today-tag">TODAY</span>` : '';
    const subtitleHTML = day.subtitle ? `<div class="day-subtitle">${day.subtitle}</div>` : '';
    const total = day.sections.reduce((a, s) => a + s.items.length, 0);

    let itemsHTML = '';
    day.sections.forEach((sec, si) => {
      if (sec.label) {
        itemsHTML += `<div class="sub-section-label">${sec.label}</div>`;
      }
      sec.items.forEach((item, ii) => {
        const rowId = `row-${day.id}-${si}-${ii}`;
        itemsHTML += itemRowHTML(item, rowId);
      });
    });

    section.innerHTML = `
      <div class="day-header" onclick="toggleDay('${day.id}')">
        <div class="day-badge">
          <span class="day-jp">${day.label}</span>
          <span class="day-sub">${day.labelEn}</span>
        </div>
        <div class="day-title-wrap">
          <h2>${day.title}</h2>
          ${subtitleHTML}
        </div>
        ${todayTag}
        <span class="day-done-badge" id="done-${day.id}">✓ 完了</span>
        <span class="day-progress-mini" id="mini-day-${day.id}">0/${total}</span>
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-items" id="items-${day.id}">
        ${itemsHTML}
      </div>`;

    // 今日以外は最初から折りたたむ
    if (!isToday) section.classList.add('collapsed');

    container.appendChild(section);
  });
}

// ===================================================
// TOGGLE
// ===================================================
function toggleMainichi() {
  document.getElementById('card-mainichi')?.classList.toggle('collapsed');
}

function toggleDay(dayId) {
  document.getElementById(`day-${dayId}`).classList.toggle('collapsed');
}

function toggleWeekItem(rowId, stateKey, itemIdx) {
  const cur = isChecked(stateKey, itemIdx);
  setChecked(stateKey, itemIdx, !cur);
  const row = document.getElementById(rowId);
  if (!cur) { row.classList.add('checked'); spawnConfetti(); }
  else row.classList.remove('checked');
  updateDayProgress();
  updateOverall();
}

// type="module" 内では onclick="..." からグローバル関数が呼べないため公開
window.toggleWeekItem = toggleWeekItem;
window.toggleDay = toggleDay;
window.toggleMainichi = toggleMainichi;

// ===================================================
// PROGRESS
// ===================================================
function updateDayProgress() {
  DAYS.forEach(day => {
    let total = 0, done = 0;
    day.sections.forEach(sec => {
      sec.items.forEach(item => {
        total++;
        if (isChecked(item.stateKey, item.itemIdx)) done++;
      });
    });
    document.getElementById(`mini-day-${day.id}`).textContent = `${done}/${total}`;
    const el = document.getElementById(`day-${day.id}`);
    if (done === total) el.classList.add('all-done');
    else el.classList.remove('all-done');
  });
}


function updateOverall() {
  // 今日の曜日のアイテム全部（毎朝・毎日含む）
  const todayIdx = new Date().getDay();
  const todayDay = DAYS.find(d => d.dayIndex === todayIdx);
  let total = 0, done = 0;
  if (todayDay) {
    todayDay.sections.forEach(sec => {
      sec.items.forEach(item => {
        total++;
        if (isChecked(item.stateKey, item.itemIdx)) done++;
      });
    });
  }
  document.getElementById('overallBar').style.width = total ? `${(done/total*100).toFixed(1)}%` : '0%';
  document.getElementById('overallCount').textContent = `${done} / ${total}`;
}

function updateMainichiMini() {} // 毎朝カードはUI上削除済みのためno-op

// ===================================================
// AUTO RESET（1分ごとにリセット期限をチェック）
// ===================================================
function checkResets() {
  const now = Date.now();
  let needsRebuild = false;

  // カテゴリ系
  Object.keys(CAT_RESET).forEach(catId => {
    const st = catStates[catId];
    if (!st) return;
    const expected = getLastResetTs(CAT_RESET[catId], now);
    if (expected > (st.lastResetTs || 0)) {
      catStates[catId] = { checked: Array(CAT_ITEM_COUNT[catId]).fill(false), lastResetTs: expected };
      saveCatState(catId, catStates[catId]); // Firebase書き込み → onValue で全デバイスに反映
      needsRebuild = true;
    }
  });
  // 毎日系
  DAILY_STATE_KEYS.forEach(key => {
    const st = catStates[key] || { checked: [false], lastResetTs: 0 };
    const expected = getLastResetTs(DAILY_RESET, now);
    if (expected > (st.lastResetTs || 0)) {
      catStates[key] = { checked: [false], lastResetTs: expected };
      saveCatState(key, catStates[key]);
      needsRebuild = true;
    }
  });

  if (needsRebuild) {
    rebuildAllRows();
    updateDayProgress();
    updateOverall();
  }
}

function rebuildAllRows() {
  DAYS.forEach(day => {
    day.sections.forEach((sec, si) => {
      sec.items.forEach((item, ii) => {
        const row = document.getElementById(`row-${day.id}-${si}-${ii}`);
        if (row) isChecked(item.stateKey, item.itemIdx) ? row.classList.add('checked') : row.classList.remove('checked');
      });
    });
  });
}

// ===================================================
// CONFETTI & DATE
// ===================================================
function spawnConfetti() {
  const emojis = ['⭐','✨','🎉','💫','🌟','🎊'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (20 + Math.random() * 60) + 'vw';
    el.style.top = (Math.random() * 40 + 20) + 'vh';
    el.style.animationDelay = (Math.random() * 0.4) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

function updateDate() {
  const now = new Date();
  const days = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${days[now.getDay()]}`;
}

// ===================================================
// INIT
// ===================================================
updateDate();
setInterval(checkResets, 60000);
setInterval(updateDate, 60000);

// Firebase からリアルタイム同期
// onValue: データ取得 & 変更検知のたびに呼ばれる
let uiBuilt = false;
onValue(checklistRef, snapshot => {
  applyResets(snapshot.val()); // リセット処理を適用して catStates を更新
  if (!uiBuilt) {
    buildDays();               // 初回のみDOMを構築
    uiBuilt = true;
  } else {
    rebuildAllRows();          // 他デバイスからの変更をUIに反映
  }
  updateDayProgress();
  updateOverall();
}, error => {
  console.error('Firebase onValue error:', error);
});
</script>
